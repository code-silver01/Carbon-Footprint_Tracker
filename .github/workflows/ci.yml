name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies (Server)
      working-directory: ./server
      run: npm ci
      
    - name: Run ESLint (Server)
      working-directory: ./server
      run: npm run lint
      
    - name: Run Unit Tests (Server)
      working-directory: ./server
      run: npm test

  build-and-deploy:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - id: 'auth'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
        
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v1'
      
    - name: Build Server Image
      run: docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/carbonwise-repo/server:${{ github.sha }} ./server
      
    - name: Build Client Image
      run: docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/carbonwise-repo/client:${{ github.sha }} ./client
      
    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev
      
    - name: Push Images
      run: |
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/carbonwise-repo/server:${{ github.sha }}
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/carbonwise-repo/client:${{ github.sha }}
        
    - name: Deploy Server to Cloud Run
      run: |
        gcloud run deploy carbonwise-server \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/carbonwise-repo/server:${{ github.sha }} \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated
